<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skylight - Closest</title>
    <style>
        body {
            background:
                linear-gradient(180deg, #030705 0%, #000 100%);
            color: #e4e4e4;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #widget {
            border: 4px solid #3a3a3a;
            padding: 10px;
            border-radius: 0;
            width: min(680px, 94vw);
            max-width: 920px;
            min-height: 0;
            box-shadow:
                inset 0 0 0 2px rgba(255, 235, 196, 0.04),
                0 0 18px rgba(0, 0, 0, 0.45),
                0 0 0 1px rgba(155, 255, 190, 0.03);
            background:
                linear-gradient(180deg, #111111 0%, #080808 100%);
            position: relative;
            overflow: hidden;
        }
        #widget::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(180, 180, 180, 0.04), transparent 30%, transparent 70%, rgba(0, 0, 0, 0.18));
            pointer-events: none;
        }
        #widget::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(180, 180, 180, 0.03) 1px, transparent 1px);
            background-size: 100% 6px;
            pointer-events: none;
            opacity: 0.35;
        }

        .title {
            text-transform: uppercase;
            letter-spacing: 0.32em;
            font-size: 0.72em;
            color: #e6e6e6;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0 6px;
            border-bottom: 2px solid #2f2f2f;
        }

        .title .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d7d7d7;
            box-shadow: 0 0 10px rgba(215, 215, 215, 0.45);
        }

        .airport-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
            position: relative;
            z-index: 1;
            background:
                linear-gradient(180deg, rgba(28, 28, 28, 0.98), rgba(10, 10, 10, 0.98));
            padding: 8px;
            border: 1px solid #2d2d2d;
        }

        .flip-char {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transform-style: preserve-3d;
            transform-origin: center bottom;
            will-change: transform;
            animation: charFlip 0.18s linear var(--delay, 0ms) both;
            width: 1.03em;
            min-width: 1.03em;
            height: 1.28em;
            line-height: 1;
            text-align: center;
            box-sizing: border-box;
            padding: 0;
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            vertical-align: middle;
            font-variant-numeric: tabular-nums;
            font-size: 1.20em;
        }

        .flip-char::before,
        .flip-char::after {
            content: attr(data-text);
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            line-height: 1;
            text-align: center;
            backface-visibility: hidden;
            overflow: hidden;
            pointer-events: none;
            font-family: inherit;
            font-size: 1em;
            transform: translateY(0);
        }

        .flip-char::before {
            top: 0;
            transform-origin: bottom;
            transform: rotateX(0deg);
        }

        .flip-char::after {
            top: 0;
            transform-origin: top;
            transform: rotateX(90deg);
            opacity: 0;
        }

        .flip-char-static {
            animation: none;
        }

        @keyframes charFlip {
            0%   { transform: rotateX(0deg); }
            50%  { transform: rotateX(-90deg); }
            100% { transform: rotateX(0deg); }
        }

        .panel-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
            border-bottom: 1px solid #2d2d2d;
            padding-bottom: 8px;
            background: linear-gradient(180deg, rgba(180, 180, 180, 0.03), transparent);
        }

        .panel-top .title-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
            flex: 1 1 auto;
            overflow: hidden;
        }

        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 0.68em;
            color: #ffe9b8;
        }

        .callsign {
            font-size: clamp(2.08em, 4.16vw, 2.73em);
            line-height: 1.02;
            font-weight: 700;
            color: #eeeeee;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            text-shadow: 0 0 6px rgba(157, 243, 194, 0.08);
        }

        .subline {
            display: block;
            font-size: clamp(0.806em, 1.56vw, 0.936em);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #bfbfbf;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            max-width: 100%;
        }

        .subline-secondary {
            color: #d9d9d9;
            opacity: 0.95;
        }

        .logo-box {
            flex: 0 0 auto;
            width: 210px;
            min-width: 210px;
            min-height: 105px;
            height: 105px;
            margin-top: -2px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            border: 1px solid #cfd6de;
            border-radius: 2px;
            background: linear-gradient(180deg, #fffffffd 0%, #fffffffd 100%);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.9), 0 0 6px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
            filter: drop-shadow(0 0 2px rgba(15, 23, 42, 0.12));
        }

        .route-chip {
            padding: 6px 8px;
            white-space: nowrap;
            border: 1px solid #3a3a3a;
            border-radius: 0;
            background: linear-gradient(180deg, #1f1f1f 0%, #0d0d0d 100%);
            color: #d9d9d9;
            font-size: 0.72em;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            width: fit-content;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02), 0 0 8px rgba(0, 0, 0, 0.35);
        }

        .panel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            align-items: stretch;
        }

        .metric-card {
            border: 1px solid #303030;
            border-radius: 0;
            background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%);
            padding: 8px;
            min-height: 54px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02), 0 0 6px rgba(0, 0, 0, 0.35);
        }

        .metric-card::before {
            content: "";
            display: block;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, rgba(180, 180, 180, 0.18), transparent 70%);
            margin-bottom: 4px;
        }

        .metric-label {
            font-size: clamp(0.58em, 1vw, 0.68em);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: #cfcfcf;
            margin-bottom: 2px;
        }

        .metric-value {
            color: #efefef;
            font-weight: 700;
            font-size: clamp(1.24em, 2.34vw, 1.50em);
            line-height: 1.15;
        }

        .value {
            color: #ffffff;
            font-weight: bold;
        }

        .empty-state-panel {
            min-height: 120px;
            justify-content: center;
            background: transparent;
            padding: 0;
            border: 0;
        }

        .empty-state-grid {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            width: 100%;
        }

        .empty-state-image {
            width: auto;
            height: 140px;
            max-height: 100%;
            object-fit: contain;
            flex: 0 0 auto;
            display: block;
            background: transparent;
            filter: none;
        }

        .empty-state-copy {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
            gap: 2px;
        }

        .empty-state-kicker {
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 0.68em;
            color: #ffe9b8;
        }

        .empty-state-title {
            font-size: 1.05em;
            font-weight: 700;
            color: #f5f5f5;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .empty-state-subtitle {
            font-size: 0.82em;
            color: #cfcfcf;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .no-aircraft {
            color: #b3b3b3;
            font-style: italic;
            font-size: 0.9em;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="widget">
        <div class="title">CLOSEST AIRCRAFT <span class="live-dot"></span></div>
        <div id="content">
            <div class="no-aircraft">Initializing data flow...</div>
        </div>
    </div>

    <script type="module" src="/src/closest.ts"></script>
</body>
</html>
